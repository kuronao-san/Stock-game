<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>かぶゲーム！📈 株式投資シミュレーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0f1923;--bg2:#162030;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);
      --accent:#38bdf8;--accent2:#34d399;--danger:#f87171;--warn:#fbbf24;
      --text:#e2e8f0;--muted:#64748b;--radius:16px;
    }
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:'M PLUS Rounded 1c','Nunito',sans-serif;min-height:100vh;}
    #root{min-height:100vh;}

    /* ===== APIKEY SETUP ===== */
    .apikey-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(56,189,248,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(52,211,153,.08) 0%,transparent 60%),#0f1923;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
    .apikey-box{background:#162030;border:1px solid rgba(56,189,248,.3);border-radius:24px;padding:36px;max-width:460px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5);}
    .apikey-emoji{font-size:52px;margin-bottom:16px;}
    .apikey-title{font-size:22px;font-weight:900;color:#f1f5f9;margin-bottom:8px;}
    .apikey-desc{font-size:13px;color:#64748b;line-height:1.8;margin-bottom:20px;}
    .apikey-desc a{color:var(--accent);text-decoration:none;}
    .apikey-desc a:hover{text-decoration:underline;}
    .apikey-steps{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left;}
    .apikey-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;color:#94a3b8;line-height:1.6;}
    .apikey-step:last-child{margin-bottom:0;}
    .step-num{background:var(--accent);color:#0a0e1a;border-radius:50%;width:18px;height:18px;min-width:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;margin-top:1px;}
    .apikey-input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s;letter-spacing:1px;}
    .apikey-input:focus{border-color:var(--accent);}
    .apikey-input::placeholder{color:#2d3748;letter-spacing:0;}
    .apikey-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);border:none;border-radius:10px;color:#0a0e1a;font-family:inherit;font-weight:900;font-size:15px;cursor:pointer;transition:all .2s;margin-bottom:10px;}
    .apikey-btn:hover{opacity:.88;transform:translateY(-1px);}
    .apikey-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .apikey-err{color:#f87171;font-size:12px;margin-bottom:10px;text-align:left;padding:8px 12px;background:rgba(248,113,113,.08);border-radius:8px;}
    .apikey-note{font-size:11px;color:#334155;line-height:1.6;}
    .apikey-limit{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:10px 12px;font-size:11px;color:#fde68a;text-align:left;margin-bottom:12px;line-height:1.7;}

    /* ===== APP ===== */
    .app{min-height:100vh;background:radial-gradient(ellipse at 20% 20%,rgba(56,189,248,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(52,211,153,.06) 0%,transparent 60%),var(--bg);}
    .header{background:rgba(15,25,35,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-emoji{font-size:28px;animation:bounce 2s ease-in-out infinite;}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .logo-text{font-size:18px;font-weight:900;color:var(--accent);letter-spacing:-.5px;}
    .logo-sub{font-size:11px;color:var(--muted);}
    .header-stats{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
    .hstat{text-align:center;}
    .hstat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    .hstat-value{font-size:16px;font-weight:800;margin-top:1px;}
    .level-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:40px;padding:6px 14px;}
    .level-emoji{font-size:22px;}
    .level-name{font-size:12px;font-weight:700;}
    .level-sub{font-size:10px;color:var(--muted);}
    .header-right{display:flex;align-items:center;gap:8px;}
    .header-btn{padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;transition:all .2s;}
    .header-btn:hover{color:var(--text);background:rgba(255,255,255,.1);}

    /* ===== LAYOUT ===== */
    .layout{display:flex;gap:0;min-height:calc(100vh - 66px);}
    .sidebar{width:340px;min-width:340px;border-right:1px solid var(--border);padding:24px 20px;display:flex;flex-direction:column;gap:18px;background:rgba(255,255,255,.015);overflow-y:auto;}
    .main{flex:1;padding:24px 28px;overflow-y:auto;}

    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:14px;}

    /* ===== SEARCH ===== */
    .search-area{display:flex;flex-direction:column;gap:10px;}
    .search-row{display:flex;gap:8px;}
    .search-input{flex:1;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:var(--accent);background:rgba(56,189,248,.05);}
    .search-input.has-value{border-color:rgba(56,189,248,.5);}
    .search-input::placeholder{color:#2d3748;}
    .search-hint{font-size:11px;color:var(--muted);line-height:1.6;}
    .search-hint b{color:#94a3b8;}
    .btn-search{padding:10px 14px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);border:none;border-radius:10px;color:#0a0e1a;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .btn-search:hover{opacity:.85;transform:translateY(-1px);}
    .btn-search:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* Search result */
    .search-result{background:rgba(56,189,248,.07);border:1.5px solid rgba(56,189,248,.25);border-radius:12px;padding:14px;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .sr-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .sr-code{font-size:17px;font-weight:900;color:#f1f5f9;}
    .sr-name{font-size:11px;color:var(--muted);margin-top:2px;}
    .sr-price{font-size:20px;font-weight:900;color:var(--accent);}
    .sr-meta{font-size:10px;color:#475569;margin-bottom:10px;}
    .buy-row{display:flex;gap:8px;align-items:center;}
    .shares-input{flex:1;background:rgba(255,255,255,.08);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none;}
    .shares-input:focus{border-color:var(--accent2);}
    .btn-buy{padding:9px 18px;background:linear-gradient(135deg,#059669,#34d399);border:none;border-radius:8px;color:#052e16;font-weight:900;font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;}
    .btn-buy:hover{opacity:.85;transform:translateY(-1px);}
    .btn-buy:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .cost-preview{font-size:12px;color:var(--muted);margin-top:6px;text-align:right;}
    .cost-preview.over{color:var(--danger);font-weight:700;}

    /* ===== CASH ===== */
    .cash-card{background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(52,211,153,.08));border:1.5px solid rgba(56,189,248,.3);}
    .cash-amount{font-size:28px;font-weight:900;color:#f1f5f9;}
    .cash-label{font-size:11px;color:var(--muted);margin-bottom:6px;}

    /* ===== HINT ===== */
    .hint-card{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:var(--radius);padding:14px;font-size:13px;color:#fde68a;line-height:1.6;cursor:pointer;transition:background .2s;}
    .hint-card:hover{background:rgba(251,191,36,.13);}

    /* ===== PROGRESS ===== */
    .progress-wrap{margin-top:8px;}
    .progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
    .progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}

    /* ===== GRAPH ===== */
    .graph-wrap{width:100%;height:110px;position:relative;overflow:hidden;border-radius:10px;background:rgba(0,0,0,.2);}

    /* ===== RATE LIMIT BADGE ===== */
    .rate-bar{display:flex;align-items:center;gap:8px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.15);border-radius:10px;padding:10px 12px;}
    .rate-label{font-size:11px;color:#fde68a;flex:1;}
    .rate-dots{display:flex;gap:3px;}
    .rate-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);}
    .rate-dot.used{background:#fbbf24;}

    /* ===== SUMMARY ===== */
    .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
    .sum-card-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
    .sum-card-value{font-size:18px;font-weight:900;}

    /* ===== TABLE ===== */
    .portfolio-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .portfolio-title{font-size:16px;font-weight:800;}
    .btn-refresh-all{padding:8px 16px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:8px;color:var(--accent);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn-refresh-all:hover{background:rgba(56,189,248,.18);}
    .btn-refresh-all:disabled{opacity:.4;cursor:not-allowed;}
    .stock-table{width:100%;border-collapse:separate;border-spacing:0 8px;}
    .stock-table th{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:600;padding:0 14px 8px;text-align:right;border-bottom:1px solid var(--border);}
    .stock-table th:first-child{text-align:left;}
    .srow{background:var(--card);transition:background .2s;}
    .srow:hover{background:rgba(255,255,255,.07);}
    .srow td{padding:14px;font-size:13px;font-weight:700;text-align:right;border-top:1px solid var(--border);border-bottom:1px solid var(--border);color:#94a3b8;}
    .srow td:first-child{text-align:left;border-left:3px solid var(--border);border-radius:12px 0 0 12px;}
    .srow td:last-child{border-right:1px solid var(--border);border-radius:0 12px 12px 0;}
    .srow.profit-row td:first-child{border-left-color:var(--accent2);}
    .srow.loss-row td:first-child{border-left-color:var(--danger);}
    .srow.loading-row td:first-child{border-left-color:var(--muted);}
    .td-code{font-size:15px;font-weight:900;color:#f1f5f9;}
    .td-name{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400;}

    .profit{color:var(--accent2);}
    .loss{color:var(--danger);}
    .neutral{color:#94a3b8;}
    .spinner{width:12px;height:12px;border:2px solid #334155;border-top-color:#94a3b8;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
    .badge-loading{background:rgba(100,116,139,.2);color:#64748b;}
    .badge-error{background:rgba(248,113,113,.12);color:var(--danger);}
    .btn-sm{padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;transition:all .15s;margin-left:4px;}
    .btn-sell{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.2);}
    .btn-sell:hover{background:rgba(248,113,113,.22);}
    .btn-upd{background:rgba(56,189,248,.1);color:var(--accent);border:1px solid rgba(56,189,248,.2);}
    .btn-upd:hover{background:rgba(56,189,248,.18);}
    .btn-upd:disabled{opacity:.35;cursor:not-allowed;}

    .empty{text-align:center;padding:60px 20px;}
    .empty-icon{font-size:48px;margin-bottom:14px;}
    .empty-text{font-size:15px;color:#334155;font-weight:700;}
    .empty-hint{font-size:12px;color:#1e293b;margin-top:6px;}

    /* ===== TOAST ===== */
    .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
    .toast{background:#1e293b;border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slideIn .3s ease;max-width:300px;line-height:1.5;}
    .toast.success{border-left:4px solid var(--accent2);color:#a7f3d0;}
    .toast.error{border-left:4px solid var(--danger);color:#fca5a5;}
    .toast.info{border-left:4px solid var(--accent);color:#bae6fd;}
    .toast.warn{border-left:4px solid var(--warn);color:#fde68a;}
    @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

    /* ===== MODAL ===== */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .2s;}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:360px;width:100%;animation:popIn .25s ease;}
    @keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-title{font-size:18px;font-weight:900;margin-bottom:8px;}
    .modal-body{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:20px;}
    .modal-actions{display:flex;gap:10px;}
    .btn-modal{flex:1;padding:12px;border-radius:10px;border:none;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;}
    .btn-modal-cancel{background:rgba(255,255,255,.07);color:var(--text);}
    .btn-modal-confirm{background:linear-gradient(135deg,#dc2626,#f87171);color:#fff;}
    .sell-shares-input{width:90px;background:rgba(255,255,255,.08);border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none;text-align:center;}
    .sell-shares-input:focus{border-color:var(--danger);}
    .last-saved{font-size:10px;color:#1e3a5f;text-align:center;}

    @media(max-width:900px){.layout{flex-direction:column;}.sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);}.sum-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:600px){.header{padding:12px 16px;}.main{padding:16px;}.header-stats{gap:12px;}.stock-table{font-size:11px;}.stock-table th,.srow td{padding:10px 8px;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ===== CONSTANTS =====
const SAVE_KEY = "kabugame_v2";
const APIKEY_KEY = "kabugame_av_key";
const INITIAL_CASH = 1_000_000;
const MAX_REQUESTS_PER_MIN = 5;
const MAX_REQUESTS_PER_DAY = 25;
const RATE_KEY = "kabugame_rate";

const LEVELS = [
  { min: 0,         label: "見習い投資家", emoji: "🐣", color: "#94a3b8" },
  { min: 1_100_000, label: "初級投資家",   emoji: "🐥", color: "#fbbf24" },
  { min: 1_300_000, label: "中級投資家",   emoji: "🦊", color: "#fb923c" },
  { min: 1_600_000, label: "上級投資家",   emoji: "🦁", color: "#f472b6" },
  { min: 2_000_000, label: "伝説の投資家", emoji: "🐉", color: "#a78bfa" },
];

const HINTS = [
  "💡 「安く買って高く売る」が投資の基本だよ！",
  "💡 一つの会社だけに全額投資するのはリスクが高いよ。分散投資を試してみよう！",
  "💡 株価は毎日変わる。焦らずじっくり待つのも大切な戦略だよ！",
  "💡 知っている会社・好きな会社の株から調べてみよう！",
  "💡 株を買うときは「なぜこの会社が成長するか」を考えてみよう！",
  "💡 損切り（損が大きくなる前に売る）も大事なテクニックだよ！",
  "💡 配当金という仕組みもあるよ。持っているだけでお金がもらえる会社もある！",
  "💡 無料プランは1日25回まで株価を調べられるよ。大切に使おう！",
];

// ===== HELPERS =====
const saveGame = (s) => { try { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); } catch {} };
const loadGame = () => { try { const d = localStorage.getItem(SAVE_KEY); return d ? JSON.parse(d) : null; } catch { return null; } };
const fmt = (n) => n == null ? "—" : Math.round(n).toLocaleString("ja-JP");
const fmtPct = (n) => n == null ? "—" : `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
const getLevel = (t) => { for (let i = LEVELS.length - 1; i >= 0; i--) { if (t >= LEVELS[i].min) return { ...LEVELS[i], index: i }; } return { ...LEVELS[0], index: 0 }; };

// ===== RATE LIMITER =====
const getRateState = () => {
  try {
    const d = localStorage.getItem(RATE_KEY);
    if (!d) return { minuteTs: [], dayCount: 0, dayDate: "" };
    return JSON.parse(d);
  } catch { return { minuteTs: [], dayCount: 0, dayDate: "" }; }
};
const saveRateState = (s) => { try { localStorage.setItem(RATE_KEY, JSON.stringify(s)); } catch {} };

const checkAndConsumeRate = () => {
  const now = Date.now();
  const today = new Date().toDateString();
  let state = getRateState();

  // Reset day counter if new day
  if (state.dayDate !== today) { state.dayCount = 0; state.dayDate = today; }

  // Clean old minute timestamps
  state.minuteTs = (state.minuteTs || []).filter(t => now - t < 60_000);

  if (state.dayCount >= MAX_REQUESTS_PER_DAY) return { ok: false, reason: `本日の上限（${MAX_REQUESTS_PER_DAY}回）に達しました。明日また試してね！` };
  if (state.minuteTs.length >= MAX_REQUESTS_PER_MIN) return { ok: false, reason: `1分間に${MAX_REQUESTS_PER_MIN}回まで。少し待ってから試してね！` };

  state.minuteTs.push(now);
  state.dayCount++;
  saveRateState(state);
  return { ok: true, used: state.dayCount };
};

const getRateInfo = () => {
  const now = Date.now();
  const today = new Date().toDateString();
  let state = getRateState();
  if (state.dayDate !== today) return { dayUsed: 0, dayMax: MAX_REQUESTS_PER_DAY };
  return { dayUsed: state.dayCount || 0, dayMax: MAX_REQUESTS_PER_DAY };
};

// ===== ALPHA VANTAGE API =====
// 銘柄コード変換: 日本株4桁→7203.T, 米国株→そのまま
const toSymbol = (input) => {
  const s = input.trim().toUpperCase();
  if (/^\d{4}$/.test(s)) return s + ".T";  // 日本株
  if (/^\d{4}\.T$/i.test(s)) return s.toUpperCase();
  return s; // 米国株・ETFなど
};

const fromSymbol = (sym) => sym.replace(/\.T$/i, "");


  // CORSプロキシ経由でAlpha Vantage APIを呼ぶ
  const avFetch = async (avUrl) => {
    const proxied = `https://api.allorigins.win/raw?url=${encodeURIComponent(avUrl)}`;
    const r = await fetch(proxied);
    if (!r.ok) throw new Error('fetch_error');
    return r.json();
  };

async function avSearchSymbol(query, apiKey) {
  // SYMBOL_SEARCH で候補を取得
  const sym = toSymbol(query);
  // まず直接 GLOBAL_QUOTE を試す
  const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(sym)}&apikey=${apiKey}`;
  const res = await fetch(url);
  const data = await res.json();

  if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
    const q = data["Global Quote"];
    const price = parseFloat(q["05. price"]);
    const name = fromSymbol(sym);
    return { symbol: sym, name: name, price, change: parseFloat(q["09. change"] || 0), changePct: q["10. change percent"] || "0%" };
  }

  // 見つからない場合は SYMBOL_SEARCH を試す
  const searchUrl = `https://www.alphavantage.co/query?function=SYMBOL_SEARCH&keywords=${encodeURIComponent(query)}&apikey=${apiKey}`;
  const sdata = await avFetch(searchUrl);

  if (sdata.bestMatches && sdata.bestMatches.length > 0) {
    const best = sdata.bestMatches[0];
    const foundSym = best["1. symbol"];
    // 見つかったシンボルで再度 GLOBAL_QUOTE
    const url2 = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(foundSym)}&apikey=${apiKey}`;
    const d2 = await avFetch(url2);
    if (d2["Global Quote"] && d2["Global Quote"]["05. price"]) {
      const q = d2["Global Quote"];
      return { symbol: foundSym, name: best["2. name"] || foundSym, price: parseFloat(q["05. price"]), change: parseFloat(q["09. change"] || 0), changePct: q["10. change percent"] || "0%" };
    }
    return { symbol: foundSym, name: best["2. name"] || foundSym, price: null };
  }

  if (data["Note"] || data["Information"]) throw new Error("rate_limit");
  throw new Error("not_found");
}

async function avGetPrice(symbol, apiKey) {
  const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(symbol)}&apikey=${apiKey}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data["Note"] || data["Information"]) throw new Error("rate_limit");
  if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
    return parseFloat(data["Global Quote"]["05. price"]);
  }
  throw new Error("not_found");
}

// ===== TOAST =====
let tid = 0;
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = (msg, type = "info") => {
    const id = ++tid;
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  };
  return { toasts, add };
}

// ===== MINI GRAPH =====
function MiniGraph({ history }) {
  if (!history || history.length < 2) return (
    <div className="graph-wrap" style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
      <span style={{ fontSize: 11, color: "#334155" }}>売買すると資産推移グラフが表示されます</span>
    </div>
  );
  const vals = history.map(h => h.total);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const W = 600, H = 110, PAD = 8;
  const pts = vals.map((v, i) => {
    const x = PAD + (i / (vals.length - 1)) * (W - PAD * 2);
    const y = H - PAD - ((v - min) / range) * (H - PAD * 2);
    return `${x},${y}`;
  }).join(" ");
  const color = vals[vals.length - 1] >= vals[0] ? "#34d399" : "#f87171";
  return (
    <div className="graph-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "100%" }} preserveAspectRatio="none">
        <defs>
          <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <polyline fill="none" stroke={color} strokeWidth="2.5" points={pts} />
        <polyline fill="url(#gg)" stroke="none" points={`${PAD},${H} ${pts} ${W - PAD},${H}`} />
      </svg>
    </div>
  );
}

// ===== RATE DOTS =====
function RateDots({ used, max }) {
  return (
    <div className="rate-bar">
      <div className="rate-label">📊 本日の株価取得: {used}/{max}回</div>
      <div className="rate-dots">
        {Array.from({ length: max }).map((_, i) => (
          <div key={i} className={`rate-dot${i < used ? " used" : ""}`} />
        ))}
      </div>
    </div>
  );
}

function ApiKeySetup({ onSave }) {
  const [key, setKey] = useState("");
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState("");

  const handleSave = async () => {
    const k = key.trim();
    if (!k) { setErr("APIキーを入力してください"); return; }
    setTesting(true); setErr("");
    try {
      const avUrl = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=IBM&apikey=${k}`;
      const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(avUrl)}`);
      const data = await res.json();
      if (data["Note"] || data["Information"]) {
        setErr("レート制限中です。少し待ってから再試行してください。");
      } else if (data["Global Quote"]) {
        localStorage.setItem(APIKEY_KEY, k);
        onSave(k);
      } else {
        setErr("APIキーが正しくないか、接続できませんでした。");
      }
    } catch { setErr("接続に失敗しました。ネットワークを確認してください。"); }
    setTesting(false);
  };

  return (
    <div className="apikey-overlay">
      <div className="apikey-box">
        <div className="apikey-emoji">🔑</div>
        <div className="apikey-title">Alpha Vantage APIキーを設定</div>
        <div className="apikey-desc">
          株価を無料で取得するために<strong style={{ color: "#38bdf8" }}>Alpha Vantage</strong>の無料APIキーが必要です。<br />
          メールアドレスだけで即取得できます！
        </div>
        <div className="apikey-steps">
          <div className="apikey-step"><div className="step-num">1</div><div><a href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener">alphavantage.co/support/#api-key</a> を開く</div></div>
          <div className="apikey-step"><div className="step-num">2</div><div>用途・職業・メールアドレスを入力して「GET FREE API KEY」をクリック</div></div>
          <div className="apikey-step"><div className="step-num">3</div><div>表示されたAPIキー（英数字の文字列）をコピーして下に貼り付ける</div></div>
        </div>
        <div className="apikey-limit">
          ⚠️ 無料プランの制限：<strong>1分間に5回・1日25回</strong>まで株価を取得できます。<br />
          データは約15〜20分遅延しています。教育用ゲームとしては十分です！
        </div>
        <input className="apikey-input" type="text" placeholder="例: ABCDEFG123456789" value={key} onChange={e => { setKey(e.target.value); setErr(""); }} onKeyDown={e => e.key === "Enter" && handleSave()} />
        {err && <div className="apikey-err">⚠ {err}</div>}
        <button className="apikey-btn" onClick={handleSave} disabled={testing || !key.trim()}>
          {testing ? "確認中..." : "保存してゲームスタート！🚀"}
        </button>
        <div className="apikey-note">キーはこのブラウザにのみ保存されます。課金はありません。</div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(APIKEY_KEY) || "");
  const [showApiModal, setShowApiModal] = useState(false);
  const saved = loadGame();
  const [cash, setCash] = useState(saved?.cash ?? INITIAL_CASH);
  const [holdings, setHoldings] = useState(saved?.holdings ?? []);
  const [history, setHistory] = useState(saved?.history ?? [{ total: INITIAL_CASH, date: new Date().toLocaleDateString("ja-JP") }]);
  const [searchQuery, setSearchQuery] = useState("");
  const [searchResult, setSearchResult] = useState(null);
  const [searching, setSearching] = useState(false);
  const [buyShares, setBuyShares] = useState("100");
  const [loadingAll, setLoadingAll] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);
  const [hintIdx, setHintIdx] = useState(0);
  const [sellModal, setSellModal] = useState(null);
  const [sellShares, setSellShares] = useState("");
  const [rateInfo, setRateInfo] = useState(getRateInfo());
  const { toasts, add: addToast } = useToast();

  const evalTotal = holdings.reduce((a, h) => a + (h.currentPrice ?? h.buyPrice) * h.shares, 0);
  const totalAssets = cash + evalTotal;
  const totalCostBasis = holdings.reduce((a, h) => a + h.buyPrice * h.shares, 0);
  const totalPnl = evalTotal - totalCostBasis;
  const level = getLevel(totalAssets);
  const nextLevel = LEVELS[level.index + 1];
  const levelProgress = nextLevel ? Math.min(100, ((totalAssets - level.min) / (nextLevel.min - level.min)) * 100) : 100;

  useEffect(() => {
    saveGame({ cash, holdings, history });
    setLastSaved(new Date().toLocaleTimeString("ja-JP"));
  }, [cash, holdings]);

  const recordHistory = useCallback((c, h) => {
    const ev = h.reduce((a, x) => a + (x.currentPrice ?? x.buyPrice) * x.shares, 0);
    const total = c + ev;
    setHistory(prev => {
      const next = [...prev, { total, date: new Date().toLocaleDateString("ja-JP") }].slice(-60);
      saveGame({ cash: c, holdings: h, history: next });
      return next;
    });
  }, []);

  const consumeRate = () => {
    const r = checkAndConsumeRate();
    setRateInfo(getRateInfo());
    return r;
  };

  const handleSearch = async () => {
    if (!searchQuery.trim()) return;
    const rate = consumeRate();
    if (!rate.ok) { addToast(rate.reason, "warn"); return; }
    setSearching(true); setSearchResult(null);
    try {
      const r = await avSearchSymbol(searchQuery.trim(), apiKey);
      if (!r.price) { addToast("株価データが取得できませんでした。銘柄コードを確認してね。", "error"); }
      else { setSearchResult(r); setBuyShares("100"); }
    } catch (e) {
      if (e.message === "rate_limit") addToast("Alpha Vantageのレート制限に達しました。1分待ってね！", "warn");
      else if (e.message === "not_found") addToast("銘柄が見つかりませんでした。別のキーワードを試してね！", "error");
      else addToast("エラーが発生しました。しばらく待ってから再試行してください。", "error");
    }
    setSearching(false);
  };

  const handleBuy = () => {
    if (!searchResult || !searchResult.price) return;
    const n = parseInt(buyShares);
    if (!n || n <= 0) { addToast("株数を入力してください！", "error"); return; }
    const cost = searchResult.price * n;
    if (cost > cash) { addToast("現金が足りないよ！株数を減らしてみよう。", "error"); return; }
    const newCash = cash - cost;
    const existing = holdings.find(h => h.symbol === searchResult.symbol);
    let newHoldings;
    if (existing) {
      newHoldings = holdings.map(h => h.symbol === searchResult.symbol
        ? { ...h, shares: h.shares + n, buyPrice: (h.buyPrice * h.shares + cost) / (h.shares + n) }
        : h);
    } else {
      newHoldings = [...holdings, {
        id: Date.now(), symbol: searchResult.symbol,
        code: fromSymbol(searchResult.symbol),
        name: searchResult.name,
        buyPrice: searchResult.price, currentPrice: searchResult.price,
        shares: n, status: "ok", error: null,
      }];
    }
    setCash(newCash); setHoldings(newHoldings);
    recordHistory(newCash, newHoldings);
    addToast(`🎉 ${searchResult.name} を ${n}株 買いました！`, "success");
    setSearchResult(null); setSearchQuery("");
  };

  const openSell = (h) => { setSellModal(h); setSellShares(String(h.shares)); };

  const handleSell = () => {
    if (!sellModal) return;
    const n = parseInt(sellShares);
    if (!n || n <= 0 || n > sellModal.shares) { addToast("売る株数が正しくないよ！", "error"); return; }
    const price = sellModal.currentPrice ?? sellModal.buyPrice;
    const newCash = cash + price * n;
    const newHoldings = n === sellModal.shares
      ? holdings.filter(h => h.id !== sellModal.id)
      : holdings.map(h => h.id === sellModal.id ? { ...h, shares: h.shares - n } : h);
    const pnl = (price - sellModal.buyPrice) * n;
    setCash(newCash); setHoldings(newHoldings);
    recordHistory(newCash, newHoldings);
    addToast(`${pnl >= 0 ? "🎉" : "😢"} ${sellModal.name} ${n}株 売却！ ${pnl >= 0 ? "+" : ""}¥${fmt(Math.round(pnl))}`, pnl >= 0 ? "success" : "info");
    setSellModal(null);
  };

  const refreshOne = async (id) => {
    const h = holdings.find(x => x.id === id);
    if (!h) return;
    const rate = consumeRate();
    if (!rate.ok) { addToast(rate.reason, "warn"); return; }
    setHoldings(prev => prev.map(x => x.id === id ? { ...x, status: "loading" } : x));
    try {
      const price = await avGetPrice(h.symbol, apiKey);
      setHoldings(prev => prev.map(x => x.id === id ? { ...x, currentPrice: price, status: "ok", error: null } : x));
      addToast(`${h.code} を更新しました`, "info");
    } catch (e) {
      const msg = e.message === "rate_limit" ? "レート制限中" : "取得失敗";
      setHoldings(prev => prev.map(x => x.id === id ? { ...x, status: "error", error: msg } : x));
      if (e.message === "rate_limit") addToast("レート制限に達しました。少し待ってね！", "warn");
    }
  };

  const refreshAll = async () => {
    if (!holdings.length) return;
    setLoadingAll(true);
    for (const h of holdings) {
      const rate = consumeRate();
      if (!rate.ok) { addToast(rate.reason, "warn"); break; }
      setHoldings(prev => prev.map(x => x.id === h.id ? { ...x, status: "loading" } : x));
      try {
        const price = await avGetPrice(h.symbol, apiKey);
        setHoldings(prev => prev.map(x => x.id === h.id ? { ...x, currentPrice: price, status: "ok", error: null } : x));
      } catch (e) {
        const msg = e.message === "rate_limit" ? "レート制限中" : "取得失敗";
        setHoldings(prev => prev.map(x => x.id === h.id ? { ...x, status: "error", error: msg } : x));
        if (e.message === "rate_limit") { addToast("レート制限に達しました。残りは後で更新してね！", "warn"); break; }
      }
      // 1分5回制限のため少し間隔をあける
      if (holdings.indexOf(h) < holdings.length - 1) await new Promise(r => setTimeout(r, 13000));
    }
    setLoadingAll(false);
    addToast("株価の更新が完了しました！", "info");
  };

  const costPrice = searchResult?.price ? searchResult.price * (parseInt(buyShares) || 0) : 0;
  const canBuy = searchResult?.price && costPrice > 0 && costPrice <= cash;

  if (!apiKey) return <ApiKeySetup onSave={(k) => setApiKey(k)} />;

  return (
    <div className="app">
      {showApiModal && <ApiKeySetup onSave={(k) => { setApiKey(k); setShowApiModal(false); }} />}

      <div className="header">
        <div className="logo">
          <div className="logo-emoji">📈</div>
          <div><div className="logo-text">かぶゲーム！</div><div className="logo-sub">Alpha Vantage 株式投資シミュレーター</div></div>
        </div>
        <div className="header-stats">
          <div className="hstat"><div className="hstat-label">💴 現金</div><div className="hstat-value" style={{ color: "#38bdf8" }}>¥{fmt(cash)}</div></div>
          <div className="hstat"><div className="hstat-label">📊 評価額</div><div className="hstat-value neutral">¥{fmt(evalTotal)}</div></div>
          <div className="hstat"><div className="hstat-label">💰 総資産</div><div className="hstat-value" style={{ color: totalAssets >= INITIAL_CASH ? "#34d399" : "#f87171" }}>¥{fmt(totalAssets)}</div></div>
          <div className="hstat"><div className="hstat-label">📈 損益</div><div className={`hstat-value ${totalPnl >= 0 ? "profit" : "loss"}`}>{totalPnl >= 0 ? "+" : ""}¥{fmt(Math.round(totalPnl))}</div></div>
        </div>
        <div className="header-right">
          <div className="level-badge">
            <div className="level-emoji">{level.emoji}</div>

          <div className="card cash-card">
            <div className="cash-label">💴 使える現金</div>

            <div style={{ fontSize: 11, color: "#475569", marginTop: 4 }}>
              スタート：¥{fmt(INITIAL_CASH)} ／ 増減：

              <span style={{ fontSize: 13, color: "var(--muted)" }}>{holdings.length}銘柄</span>
              <button className="btn-refresh-all" onClick={refreshAll} disabled={loadingAll || !holdings.length}>
                {loadingAll ? "🔄 更新中（時間がかかります）..." : "🔄 全銘柄を更新"}
              </button>
            </div>
          </div>

          {holdings.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">🌱</div>
              <div className="empty-text">まだ株を持っていないよ</div>
              <div className="empty-hint">左の検索ボックスで銘柄を探して、最初の株を買ってみよう！</div>
            </div>
          ) : (
            <table className="stock-table">
              <thead>
                <tr><th>銘柄</th><th>現在値</th><th>取得価格</th><th>保有数</th><th>評価額</th><th>損益</th><th>損益率</th><th></th></tr>
              </thead>
              <tbody>
                {holdings.map(h => {
                  const cur = h.currentPrice ?? h.buyPrice;
                  const pnlAmt = (cur - h.buyPrice) * h.shares;
                  const pnlPct = ((cur - h.buyPrice) / h.buyPrice) * 100;
                  const cls = h.status === "loading" ? "loading-row" : pnlAmt >= 0 ? "profit-row" : "loss-row";
                  return (
                    <tr key={h.id} className={`srow ${cls}`}>
                      <td><div className="td-code">{h.code}</div><div className="td-name">{h.name}</div></td>
                      <td>
                        {h.status === "loading" ? <span className="badge badge-loading"><span className="spinner" /> 取得中</span>
                          : h.status === "error" ? <span className="badge badge-error">⚠ {h.error}</span>
                          : <span style={{ color: "#e2e8f0" }}>¥{fmt(cur)}</span>}
                      </td>
                      <td>¥{fmt(h.buyPrice)}</td>
                      <td>{fmt(h.shares)}株</td>
                      <td>¥{fmt(cur * h.shares)}</td>
                      <td><div className={pnlAmt >= 0 ? "profit" : "loss"}>{pnlAmt >= 0 ? "+" : ""}¥{fmt(Math.round(pnlAmt))}</div></td>
                      <td><div className={pnlPct >= 0 ? "profit" : "loss"}>{fmtPct(pnlPct)}</div></td>
                      <td>
                        <button className="btn-sm btn-upd" onClick={() => refreshOne(h.id)} disabled={h.status === "loading"}>🔄</button>
                        <button className="btn-sm btn-sell" onClick={() => openSell(h)}>売る</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>

      {/* SELL MODAL */}
      {sellModal && (
        <div className="modal-overlay" onClick={() => setSellModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">📤 {sellModal.name} を売る</div>
            <div className="modal-body">
              現在値: <strong style={{ color: "#38bdf8" }}>¥{fmt(sellModal.currentPrice ?? sellModal.buyPrice)}</strong><br />
              保有数: <strong>{fmt(sellModal.shares)}株</strong><br /><br />
              <label style={{ fontSize: 13, color: "#94a3b8" }}>売る株数を入力してね：</label><br />
              <input className="sell-shares-input" type="number" min="1" max={sellModal.shares} value={sellShares} onChange={e => setSellShares(e.target.value)} style={{ marginTop: 8 }} />
              {parseInt(sellShares) > 0 && parseInt(sellShares) <= sellModal.shares && (
                <div style={{ fontSize: 12, marginTop: 8, color: "#94a3b8" }}>
                  売却金額: ¥{fmt((sellModal.currentPrice ?? sellModal.buyPrice) * parseInt(sellShares))}<br />
                  損益: <span className={(sellModal.currentPrice ?? sellModal.buyPrice) >= sellModal.buyPrice ? "profit" : "loss"}>
                    {((sellModal.currentPrice ?? sellModal.buyPrice) >= sellModal.buyPrice ? "+" : "")}¥{fmt(Math.round(((sellModal.currentPrice ?? sellModal.buyPrice) - sellModal.buyPrice) * parseInt(sellShares)))}
                  </span>
                </div>
              )}
            </div>
            <div className="modal-actions">
              <button className="btn-modal btn-modal-cancel" onClick={() => setSellModal(null)}>キャンセル</button>
              <button className="btn-modal btn-modal-confirm" onClick={handleSell}>売る！</button>
            </div>
          </div>
        </div>
      )}

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
